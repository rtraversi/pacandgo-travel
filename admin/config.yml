backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "patty-wells"
    label: "Patty Wells - My Page"
    folder: "_agents"
    create: false
    filter:
      field: name
      value: Patty Wells
    editor:
      preview: false
    fields:
      - label: "Agent Name"
        name: "name"
        widget: "hidden"
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "e.g. Co-Owner & Senior Travel Specialist"
      - label: "Specialties"
        name: "specialties"
        widget: "list"
        hint: "Your specialty areas - one per line"
        field:
          label: Specialty
          name: specialty
          widget: string
      - label: "Bio"
        name: "bio"
        widget: "markdown"
        hint: "Write your full bio here."
        minimal: true
      - label: "Profile Photo"
        name: "photo"
        widget: "image"
        required: false
      - label: "Introduction Video URL"
        name: "video_url"
        widget: "string"
        required: false
        hint: "YouTube or Vimeo link"
      - label: "Email Address"
        name: "email"
        widget: "string"

  - name: "robert-traversi"
    label: "Robert Traversi - My Page"
    folder: "_agents"
    create: false
    filter:
      field: name
      value: Robert Traversi
    editor:
      preview: false
    fields:
      - label: "Agent Name"
        name: "name"
        widget: "hidden"
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "e.g. Travel Specialist"
      - label: "Specialties"
        name: "specialties"
        widget: "list"
        hint: "Your specialty areas - one per line"
        field:
          label: Specialty
          name: specialty
          widget: string
      - label: "Bio"
        name: "bio"
        widget: "markdown"
        hint: "Write your full bio here."
        minimal: true
      - label: "Profile Photo"
        name: "photo"
        widget: "image"
        required: false
      - label: "Introduction Video URL"
        name: "video_url"
        widget: "string"
        required: false
        hint: "YouTube or Vimeo link"
      - label: "Email Address"
        name: "email"
        widget: "string"
