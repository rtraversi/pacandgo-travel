backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

media_library:
  name: cloudinary
  config:
    cloud_name: dh811jlgd
    api_key: 678448489964378
    upload_preset: pacandgo-agents

collections:

  - name: "patty-wells"
    label: "Patty Wells - My Page"
    folder: "_agents/patty-wells"
    create: false
    editor:
      preview: false
    fields:
      - label: "Agent Name"
        name: "name"
        widget: "hidden"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Specialties"
        name: "specialties"
        widget: "list"
        hint: "Your specialty areas - one per line"
        field:
          label: Specialty
          name: specialty
          widget: string
      - label: "Bio"
        name: "bio"
        widget: "markdown"
        hint: "Write your full bio here."
        minimal: true
      - label: "Profile Photo"
        name: "photo"
        widget: "image"
        required: false
        hint: "Upload a professional headshot"
        media_library:
          config:
            multiple: false
      - label: "Introduction Video URL"
        name: "video_url"
        widget: "string"
        required: false
        hint: "YouTube or Vimeo link"
      - label: "Email Address"
        name: "email"
        widget: "string"
      - label: "Vacation & Travel Photos"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Upload your personal travel and vacation photos - these will display as a gallery on your profile page"
        field:
          label: "Photo"
          name: "photo"
          widget: "image"
          media_library:
            config:
              multiple: false

